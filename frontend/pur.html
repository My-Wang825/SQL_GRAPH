<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购 · 数据血缘图谱</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preload" href="/vendor/three.min.js" as="script">
    <link rel="preload" href="/vendor/3d-force-graph.min.js" as="script">
</head>
<body class="theme-al" data-sector="PUR">
    <div class="app">
        <header class="header">
            <div class="header-brand">
                <h1>采购 · 数据血缘</h1>
                <span class="sector-badge sector-badge-pur">PUR</span>
            </div>
            <div class="toolbar">
                <input type="text" id="search-input" class="search-input" placeholder="输入表名后回车定位">
                <span id="search-result-count" class="graph-stats">匹配 0</span>

                <div class="filter-group" title="筛选层级；色块与图中节点颜色一致（DIM 含 dim_/dm_ 前缀表）">
                    <span class="filter-label">层</span>
                    <label class="filter-check">
                        <input type="checkbox" class="layer-check" value="ODS" checked>
                        <span class="filter-check-text">ODS (蓝<span class="layer-swatch" style="--swatch: #5470c6" title="蓝" aria-hidden="true"></span>)</span>
                    </label>
                    <label class="filter-check">
                        <input type="checkbox" class="layer-check" value="DIM" checked>
                        <span class="filter-check-text">DIM (黄<span class="layer-swatch" style="--swatch: #fac858" title="黄" aria-hidden="true"></span>)</span>
                    </label>
                    <label class="filter-check">
                        <input type="checkbox" class="layer-check" value="DWD" checked>
                        <span class="filter-check-text">DWD/DWS (红<span class="layer-swatch" style="--swatch: #ee6666" title="红" aria-hidden="true"></span>)</span>
                    </label>
                    <label class="filter-check">
                        <input type="checkbox" class="layer-check" value="ADS" checked>
                        <span class="filter-check-text">ADS (青<span class="layer-swatch" style="--swatch: #73c0de" title="青" aria-hidden="true"></span>)</span>
                    </label>
                </div>
                <span id="graph-stats" class="graph-stats">0 节点 / 0 边</span>
                <button type="button" id="btn-refresh" class="btn">刷新</button>
                <a href="index.html" class="sector-switch" title="切换至电解铝板块">电解铝</a>
                <a href="ao.html" class="sector-switch" title="切换至氧化铝板块">氧化铝</a>
                <a href="rd.html" class="sector-switch" title="切换至热电板块">热电</a>
            </div>
        </header>
        <button type="button" id="agent-fab" class="agent-fab" title="智能问答" aria-expanded="false" aria-controls="agent-drawer">
            <span class="agent-fab-icon" aria-hidden="true">AI</span>
            <span class="agent-fab-text">智能问答</span>
        </button>
        <main class="main" id="main-workspace">
            <div class="main-graph-wrap graph3d-wrap" id="main-graph-wrap">
                <div id="graph-3d"></div>
                <aside id="detail-panel" class="detail-panel" style="display: none;">
                    <div class="panel-header">
                        <h3 id="panel-title">表详情</h3>
                        <button type="button" id="panel-close" class="btn-close">&times;</button>
                    </div>
                    <div id="panel-content" class="panel-content"></div>
                </aside>
                <div class="graph3d-tips">
                    鼠标左键旋转，滚轮缩放，右键平移；点击节点高亮一跳邻居
                </div>
            </div>
        </main>
        <div id="agent-drawer-backdrop" class="agent-drawer-backdrop" aria-hidden="true"></div>
        <aside id="agent-drawer" class="agent-drawer" role="dialog" aria-modal="false" aria-labelledby="agent-drawer-title" aria-hidden="true">
            <div class="agent-drawer-header">
                <h2 id="agent-drawer-title" class="agent-drawer-title">智能问答</h2>
                <button type="button" id="agent-drawer-close" class="agent-drawer-close" title="关闭">&times;</button>
            </div>
            <div id="agent-chat-log" class="agent-chat-log" role="log" aria-live="polite" aria-relevant="additions"></div>
            <div class="agent-compose">
                <label class="visually-hidden" for="agent-input">输入问题</label>
                <textarea id="agent-input" class="agent-input" rows="3" placeholder="例如：某张 ads_ 表的上游有哪些表？"></textarea>
                <div class="agent-compose-actions">
                    <button type="button" id="agent-clear-input" class="btn btn-secondary">清空</button>
                    <button type="button" id="agent-send" class="btn">发送</button>
                </div>
            </div>
        </aside>
        <div id="tooltip" class="tooltip" style="display: none;"></div>
    </div>
    <script src="/vendor/three.min.js"></script>
    <script src="/vendor/3d-force-graph.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <script src="js/app-3d.js"></script>
</body>
</html>
